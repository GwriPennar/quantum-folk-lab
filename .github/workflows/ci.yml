name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest -m "not quantum"
      - run: python scripts/check_public_safety.py
  quantum-exp-001:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev,quantum]"
      - run: pytest -m quantum
      - run: qfl basics-run --experiment bell --shots 1024
      - run: qfl maxcut-compare --graph cycle4 --depth 1 --shots 512
      - run: python scripts/check_public_safety.py
